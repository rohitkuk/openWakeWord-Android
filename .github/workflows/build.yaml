name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Diagnostics
        run: |
          java -version
          gradle --version

      - name: Accept Licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Build
        run: gradle assembleDebug --stacktrace --info

      - name: Find APK
        run: find . -name "*.apk"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "**/*.apk"